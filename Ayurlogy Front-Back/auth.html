<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Ayurlogy – Get Started</title>

<!-- Disable Mobile Zoom -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <!-- Fonts & Icons -->
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet"
          href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css"
          integrity="sha512-DTOQO9RWCH3ppGqcWaEA1BIZOC6xxalwEsw9c2QQeAIftl+Vegovlnee1c9QX4TctnWMn13TZye+giMm8e2LwA=="
          crossorigin="anonymous"
          referrerpolicy="no-referrer" /><!-- Fonts & Icons -->
          <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">
          <link rel="stylesheet"
                href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css"
                integrity="sha512-DTOQO9RWCH3ppGqcWaEA1BIZOC6xxalwEsw9c2QQeAIftl+Vegovlnee1c9QX4TctnWMn13TZye+giMm8e2LwA=="
                crossorigin="anonymous"
                referrerpolicy="no-referrer" />
    <link rel="stylesheet" href="info.css">
    <link rel="stylesheet" href="login.css">
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="auth.css">
  <link rel="stylesheet" href="toast.css">
</head>
<body>

<div id="header"></div>

<div class="auth-wrapper">
  <div class="auth-card">

    <!-- CHOICE SCREEN -->
    <div id="choiceScreen">
      <h2>Welcome to Ayurlogy</h2>
      <p>Your journey to wellness starts here</p>

      <button class="primary-btn" onclick="showSignup()">Create New Account</button>
      <button class="secondary-btn" onclick="showLogin()">Login</button>
    </div>

    <!-- SIGNUP OPTIONS -->
    <div id="signupScreen" class="hidden">
      <h2>Create Account</h2>

    <button class="social google">
  <i class="fa-brands fa-google"></i>
  Continue with Google
</button>

<button class="social facebook">
  <i class="fa-brands fa-facebook-f"></i>
  Continue with Facebook
</button>

<button class="social email" onclick="showEmailSignup()">
  <i class="fa-solid fa-envelope"></i>
  Continue with Email
</button>


      <p class="switch-text">
        Already have an account?
        <span onclick="showLogin()">Login</span>
      </p>
    </div>

    <!-- EMAIL SIGNUP -->
    <div id="emailSignupScreen" class="hidden">
      <h2>Sign up with Email</h2>
    
      <input type="text" id="username" placeholder="Username">
      <input type="email" id="email" placeholder="Email">
      <input type="password" id="password" placeholder="Password">
    
      <button class="primary-btn" onclick="showTermsBox()">Create Account</button>

    <!-- TERMS & CONDITIONS -->
<div id="termsBox" class="hidden" style="margin-top:15px; text-align:left;">
  <h3 style="font-size:15px;">Terms & Conditions</h3>
  <p style="font-size:13px; color:#555;">
    By creating an account, you agree to Ayurlogy’s Terms of Service and Privacy Policy.
  </p>

  <label style="font-size:13px;">
    <input type="checkbox" id="agree">
    I agree to the Terms & Conditions
  </label>

  <button class="primary-btn" style="margin-top:10px;" onclick="confirmSignup()">
    Accept & Create Account
  </button>
</div>

      <p class="switch-text" onclick="showSignup()">← Back</p>
    </div>
    

    <!-- LOGIN -->
    <div id="loginScreen" class="hidden">
      <h2>Login</h2>
    
      <input type="text" id="loginUsername" placeholder="Username">
      <input type="password" id="loginPassword" placeholder="Password">
    
      <button class="primary-btn" onclick="loginUser()">Login</button>
    
      <p class="switch-text">
        New here?
        <span onclick="showSignup()">Create account</span>
      </p>
    </div>    
</div>
</div>

<div id="footer"></div>
<script>
    loadCommon();
  </script>
  <script src="info.js"></script>
  <script src="toast.js"></script>
  <script src="termsandcondition.js"></script>
<script src="layout.js"></script>
<script src="auth.js"></script>

</body>
</html>
