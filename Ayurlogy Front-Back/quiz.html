<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Ayurveda Dosha Quiz | Ayurlogy</title>

  <!-- Fonts -->
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">

  <!-- Icons -->
  <link rel="stylesheet"
        href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css"
        integrity="sha512-DTOQO9RWCH3ppGqcWaEA1BIZOC6xxalwEsw9c2QQeAIftl+Vegovlnee1c9QX4TctnWMn13TZye+giMm8e2LwA=="
        crossorigin="anonymous"
        referrerpolicy="no-referrer" />

  <!-- Styles -->
  <link rel="stylesheet" href="quiz.css">
  <link rel="stylesheet" href="info.css">
  <link rel="stylesheet" href="toast.css">
</head>
<body>

  <div id="header"></div>

<section class="hero">
  <div>
    <h1>Heal Naturally with AI Powered Ayurveda</h1>
    <p>Discover your unique body constitution through our smart Ayurvedic Dosha Quiz and receive personalized wellness insights.</p>
    <button class="btn-primary" onclick="startQuiz()">Start Dosha Quiz</button>
  </div>
  
  <!-- Use a project-relative image path -->
  <img src="QuizImage (1).png" alt="Quiz illustration"/>
</section>

<section class="quiz-section" id="quizSection">
  <div class="quiz-container" id="quizBox">
    <h2>Ayurvedic Body Type Quiz</h2>
    <div id="progress"></div>
    <div class="question" id="questionText"></div>
    <div class="options" id="optionsBox"></div>
    <div class="quiz-actions">
      <button onclick="prevQuestion()">Previous</button>
      <button onclick="nextQuestion()">Next</button>
    </div>
  </div>

  <div class="quiz-container result-box" id="resultBox">
    <h2>Your Dosha Result</h2>
    <p id="resultText"></p>
    <div class="result-card" id="resultDescription"></div>
    <div class="result-actions">
      <button onclick="restartQuiz()">Take Quiz Again</button>
      <a href="feedback.html" class="btn-feedback">Feedback</a>
    </div>
  </div>
</section>

<div id="footer"></div>

<script src="info.js"></script>
<script src="toast.js"></script>
<script src="quiz.js"></script>
<script>
  loadCommon();
</script>

</body>
</html>
